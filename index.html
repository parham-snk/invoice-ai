<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div class="" id="logs">

    </div>
</body>
<script>
    function getColData(c) {
        let col = String(c).split('تا')

        let tr = document.createElement("tr")
        let td_name = document.createElement("td")
        let td_qty = document.createElement("td")
        td_name.innerHTML = col[1]
        td_qty.innerHTML = col[0]
        tr.append(td_name)
        tr.appendChild(td_qty)
        return tr

    }
    function getRows(t) {
        let text = String(t)
        if (text.split("و").length > 0) {
            
            let data = text.split("و").map(getColData)
            let table = document.createElement("table")
            let trh = document.createElement("tr")
            let th = document.createElement("th")
            let th2 = document.createElement("th")
            th.innerHTML = "تعداد"
            th2.innerHTML = "نام"
            table.append(th)
            table.append(th2)
            data.forEach(row => table.appendChild(row))

            
            document.body.append(table)
        }
    }

   
    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    const recognition = new SpeechRecognition();

    recognition.lang = "fa-IR"; // فارسی
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        let text = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            text += event.results[i][0].transcript;
        }

        getRows(text)
    };

    recognition.start();
</script>

</html>
